services:
  db:
    image: mysql:8.0-oracle
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: product_comparison_db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 160M
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${DB_ROOT_PASSWORD}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    command: --performance_schema=OFF --innodb_buffer_pool_size=16M --max_connections=20

  api:
    build: .
    container_name: product_comparison_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      # Resource limits for Java 21 (Optimized for Production tiny VPS)
      - JAVA_OPTS=-Xmx140m -Xms140m -Xss256k -XX:+UseSerialGC -Xverify:none -XX:TieredStopAtLevel=1
    deploy:
      resources:
        limits:
          memory: 240M

  caddy:
    image: caddy:2-alpine
    container_name: caddy_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 30M

volumes:
  db_data:
  caddy_data:
  caddy_config:
