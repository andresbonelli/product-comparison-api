spring:
  datasource:
    url: jdbc:mysql://localhost:3306/item_comparison?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&useTimezone=true&serverTimezone=GMT&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration/common,classpath:db/migration/dev
    clean-disabled: false

app:
  api-keys:
    days-valid-user: 7
