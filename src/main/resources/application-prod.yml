spring:
  datasource:
    url: jdbc:mysql://db:3306/product_comparison_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 30000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    clean-disabled: true

management:
  server:
    port: 9001
  endpoints:
    web:
      exposure:
        include: "*"

bucket4j:
  enabled: true

app:
  cache:
    ttl: 3600000
  api-keys:
    days-valid-user: 1
